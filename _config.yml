theme: jekyll-theme-chirpy

url: "https://alanwi.github.io"
baseurl: ""
lang: zh-CN
timezone: Asia/Shanghai

title: WWei's Blog
tagline: 学习 · 项目 · 生活
description: >-
  一万年太久，只争朝夕。

social:
  name: Alan
  email: ""
  links:
    - https://github.com/AlanWi

github:
  username: AlanWi

avatar: /assets/img/avatar.jpg

theme_mode: # "" = system preference, "light", "dark"

toc: true

paginate: 10

permalink: /posts/:title/

# Disqus / Utterances / Giscus
comments:
  active: # empty = disabled
  disqus:
    shortname: ""
  utterances:
    repo: ""
    issue_term: ""
  giscus:
    repo: ""
    repo_id: ""
    category: ""
    category_id: ""
    mapping: ""
    strict: ""
    input_position: ""
    lang: zh-CN
    reactions_enabled: ""

google_analytics:
  id: ""

# ----- Collections: tabs -----
collections:
  tabs:
    output: true
    sort_by: order

# ----- Defaults -----
defaults:
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      dynamic_title: true
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      permalink: /posts/:title/
  - scope:
      path: assets/img/favicons
    values:
      swcache: true

# ----- Archives plugin -----
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

exclude:
  - README.md
  - vendor
  - tools
  - Gemfile
  - Gemfile.lock
  - .github
