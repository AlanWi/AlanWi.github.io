# 网站基本信息
title: "我的技术博客"
description: "记录编程学习、技术分享与生活感悟"
author: "你的名字"
email: "你的邮箱@example.com"

# 网站基础配置
baseurl: "" # 保持为空，因为我们使用根域名
url: "https://你的用户名.github.io"

# 构建配置
markdown: kramdown
theme: minima # GitHub Pages 默认主题，简单易用
plugins:
  - jekyll-feed # 生成 RSS 订阅
  - jekyll-seo-tag # 优化搜索引擎
  - jekyll-paginate # 文章分页

# 分页配置
paginate: 10 # 每页显示10篇文章
paginate_path: "/page:num/"

# 文章永久链接格式
permalink: /:year/:month/:day/:title/

# 排除不需要构建的文件
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
